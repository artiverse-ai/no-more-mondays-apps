name: Deploy to Vercel (production)

# Webhook auto-deploys from Vercel→GitHub are blocked on this Hobby plan
# because Vercel requires the commit author to be a Vercel team member.
# Instead, this Action calls `vercel deploy --prod` directly using the
# team owner's access token (stored as the VERCEL_TOKEN repo secret),
# which is recognized regardless of who authored the commit.
#
# Trigger: every push to main + manual via Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Vercel project IDs are not secrets (they appear in URLs). Pinning them
# here means `vercel pull` won't try to interactively link the repo to a
# project — the token alone is enough to authenticate.
env:
  VERCEL_ORG_ID: team_q5gGgqCieIcVQAWpKnjF9368
  VERCEL_PROJECT_ID: prj_UTDeDUoInQ0M4n1PQbAxCrSK9Ype

# Keep only one production deploy running at a time. New pushes during a
# running deploy queue up; older queued deploys are cancelled so we always
# land on the latest commit.
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # We let Vercel build server-side rather than building on the runner.
      # `vercel build` locally fails because the project uses pnpm (per
      # pnpm-lock.yaml) and the GitHub Actions runner doesn't pre-install
      # pnpm. Letting Vercel build is also closer to what happens when you
      # run `vercel --prod` interactively — which has been working all session.
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
